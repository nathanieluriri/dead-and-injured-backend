name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e

            APP_DIR="$HOME/dead-and-injured-backend"

            if [ ! -d "$APP_DIR" ]; then
              echo "Creating $APP_DIR"
              mkdir -p "$APP_DIR"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Cloning repo into $APP_DIR"
              git clone https://github.com/nathanieluriri/dead-and-injured-backend.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git pull origin master

            DOMAIN="game-api.visichek.app"
            EMAIL="uririnathaniel@gmail.com"
            APP_PORT="7880"
            SETUP_SCRIPT="$APP_DIR/server_automations/setup-ngnix-letsencryp.sh"

            if [ -f "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" ]; then
              echo "Cert for $DOMAIN already present — running dry-run renewal"
              sudo certbot renew --cert-name "$DOMAIN" --dry-run
            else
              echo "No cert for $DOMAIN — running nginx + Let's Encrypt setup"
              chmod +x "$SETUP_SCRIPT"
              "$SETUP_SCRIPT" "$DOMAIN" "$APP_PORT" "$EMAIL"
            fi

            docker compose down
            docker compose up --build -d
